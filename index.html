<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaki Puzzle Tool</title>
    <style>
        :root {
            --bg: #F9F4F0; 
            --accent-pink: #F5D5D5; 
            --accent-blue: #D1E1E4; 
            --text-brown: #6D5D5D; 
            --btn-swap-pink: #D8A7A7; 
            --panel-bg: rgba(255, 255, 255, 0.85);
        }

        body { 
            font-family: 'Palatino', 'Georgia', serif; 
            background-color: var(--bg); 
            color: var(--text-brown);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 600px; }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--accent-pink);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(109, 93, 93, 0.08);
            margin-bottom: 20px;
        }

        h2 { text-align: center; color: var(--text-brown); letter-spacing: 1px; font-weight: normal; margin-top: 0; }

        .section-header { 
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9rem; font-weight: bold; color: #9A8282; 
            margin: 15px 0 10px; padding-bottom: 5px; border-bottom: 1px solid var(--accent-pink); 
        }

        .file-upload-wrapper { position: relative; width: 80px; overflow: hidden; }
        #fileInput { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .file-label { background: var(--accent-blue); padding: 5px 10px; border-radius: 8px; font-size: 0.75rem; cursor: pointer; display: inline-block; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .full-width { grid-column: span 2; }
        
        label { display: block; font-size: 0.75rem; margin-bottom: 4px; padding-left: 4px; font-weight: 500;}
        input[type="number"], select {
            width: 100%; padding: 10px; border: 1px solid var(--accent-blue);
            border-radius: 10px; box-sizing: border-box; background: white;
            color: var(--text-brown); outline: none;
        }

        input[type="color"] { 
            -webkit-appearance: none; width: 40px; height: 40px; border: 2px solid var(--accent-blue); 
            border-radius: 4px; cursor: pointer; padding: 0; background: none; overflow: hidden;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; }

        /* 滑块样式 */
        input[type="range"] { width: 100%; appearance: none; background: transparent; padding: 0; margin: 12px 0; }
        input[type="range"]::-webkit-slider-runnable-track { height: 6px; background: var(--accent-blue); border-radius: 3px; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--text-brown); margin-top: -5px; cursor: pointer; }

        /* 新增：编号调整的排版样式 */
        .setting-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 12px; }
        .setting-row > .flex-1 { flex: 1; }
        .setting-row > .color-wrap { flex: 0 0 45px; display: flex; flex-direction: column; align-items: center; }
        .sub-header { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; font-weight: bold; margin: 10px 0 5px; color: var(--text-brown); }

        .preview-pool {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr));
            gap: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto;
            background: rgba(255,255,255,0.5); padding: 10px; border-radius: 12px; border: 1px dashed var(--accent-pink);
        }
        .thumb-wrapper { position: relative; cursor: pointer; }
        .thumb-wrapper.swap-active { border: 2px solid var(--btn-swap-pink); border-radius: 8px; transform: scale(0.95); }
        .thumb-wrapper img { width: 100%; height: 65px; object-fit: cover; border-radius: 6px; display: block; }
        .thumb-badge { position: absolute; top: -5px; right: -5px; background: var(--text-brown); color: white; font-size: 0.6rem; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; border: 1px solid white; }

        .btn-main { width: 100%; padding: 14px; background: var(--accent-pink); color: var(--text-brown); border: none; border-radius: 20px; font-size: 0.95rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(245, 213, 213, 0.4); margin-bottom: 10px; }
        .btn-swap { background: var(--btn-swap-pink); color: white; }
        .btn-swap.active { filter: brightness(0.9); }
        .btn-clear { background: var(--accent-blue); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(109, 93, 93, 0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--bg); padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; border: 2px solid var(--accent-pink); }
        .modal-box img { width: 100%; border-radius: 10px; max-height: 50vh; object-fit: contain; background: #fff; margin-bottom: 15px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; }
        
        .toggle-switch { appearance: none; width: 40px; height: 20px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; flex-shrink: 0; }
        .toggle-switch:checked { background: var(--accent-pink); }
        .toggle-switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-switch:checked::after { left: 22px; }

        .font-preview-box { height: 80px; background: #EFEBE9; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-top: 10px; border: 1px dashed var(--btn-swap-pink); }
        #resultContainer img { width: 100%; border-radius: 15px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Kaki Puzzle Tool</h2>
        
        <div class="section-header">
            <span>图片导入</span>
            <div class="file-upload-wrapper">
                <div class="file-label">选择图片</div>
                <input type="file" id="fileInput" multiple accept="image/*">
            </div>
        </div>
        <div class="preview-pool" id="pool"></div>
        <div style="margin-top: 15px;">
            <button class="btn-main btn-swap" id="swapBtn" onclick="toggleSwapMode()">调换图片</button>
            <button class="btn-main btn-clear" onclick="clearStorage()">清空已存图片</button>
        </div>

        <div class="section-header"><span>拼图参数</span></div>
        <div class="control-grid">
            <div class="full-width">
                <label>拼图比例</label>
                <select id="ratioSelect" onchange="toggleRatioInput()">
                    <option value="1:1">1:1 正方形</option>
                    <option value="3:4">3:4 人像</option>
                    <option value="9:16">9:16 长屏</option>
                    <option value="custom">自定义比例</option>
                </select>
            </div>
            <div id="customRatioUI" class="full-width control-grid" style="display:none; margin-top:5px;">
                <div><label>宽 (px)</label><input type="number" id="ratioW" value="1"></div>
                <div><label>高 (px)</label><input type="number" id="ratioH" value="1"></div>
            </div>
            <div><label>行数</label><input type="number" id="rows" value="3"></div>
            <div><label>列数</label><input type="number" id="cols" value="3"></div>
            <div class="full-width"><label>导出画质 (20-100%)</label><input type="number" id="quality" value="80" min="20" max="100"></div>
        </div>

        <div class="section-header">
            <span>编号调整</span>
            <input type="checkbox" class="toggle-switch" id="numEnable" checked onchange="toggleNumSection()">
        </div>
        
        <div id="numSettings">
            <div style="margin-bottom: 10px;">
                <label>起始编号</label>
                <input type="number" id="startNum" value="1" oninput="updatePreview()">
            </div>

            <div class="setting-row">
                <div class="flex-1">
                    <label>字体选择</label>
                    <select id="fontFamily" onchange="updatePreview()">
                        <option value="sans-serif">系统黑体</option>
                        <option value="'Palatino', 'Georgia', serif">复古花体</option>
                        <option value="'SimSun', 'STSong', serif">经典宋体</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label>字体不透明度</label>
                    <input type="range" id="fAlpha" value="1" step="0.1" min="0" max="1" oninput="updatePreview()">
                </div>
                <div class="color-wrap">
                    <label>颜色</label>
                    <input type="color" id="fColor" value="#000000" oninput="updatePreview()">
                </div>
            </div>

            <div class="sub-header">
                <span>描边</span>
                <input type="checkbox" class="toggle-switch" id="sEnable" onchange="toggleStroke(); updatePreview()">
            </div>
            <div class="setting-row" id="strokeSettings" style="display: none;">
                <div class="flex-1">
                    <label>描边粗细</label>
                    <input type="number" id="sWidth" value="5" oninput="updatePreview()">
                </div>
                <div class="flex-1">
                    <label>描边不透明度</label>
                    <input type="range" id="sAlpha" value="1" step="0.1" min="0" max="1" oninput="updatePreview()">
                </div>
                <div class="color-wrap">
                    <label>颜色</label>
                    <input type="color" id="sColor" value="#000000" oninput="updatePreview()">
                </div>
            </div>

            <div class="sub-header">
                <span>字体阴影</span>
                <input type="checkbox" class="toggle-switch" id="shEnable" onchange="toggleShadow(); updatePreview()">
            </div>
            <div class="setting-row" id="shadowSettings" style="display: none;">
                <div class="flex-1">
                    <label>阴影不透明度</label>
                    <input type="range" id="shAlpha" value="0.5" step="0.1" min="0" max="1" oninput="updatePreview()">
                </div>
                <div class="color-wrap">
                    <label>颜色</label>
                    <input type="color" id="shColor" value="#000000" oninput="updatePreview()">
                </div>
            </div>

            <div class="setting-row">
                <div class="flex-1">
                    <label>编号位置</label>
                    <select id="pos">
                        <option value="rb">右下</option><option value="lb">左下</option>
                        <option value="rt">右上</option><option value="lt">左上</option>
                        <option value="cc">中心</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label>编号大小</label>
                    <input type="number" id="fSize" value="40" oninput="updatePreview()">
                </div>
            </div>

            <div class="font-preview-box" id="previewBox"><span id="previewText">1</span></div>
        </div>

        <button class="btn-main" style="margin-top: 20px;" onclick="generate()">生成拼图</button>
    </div>
    <div id="resultContainer"></div>
</div>

<div class="modal-overlay" id="viewModal"><div class="modal-box"><h3>图片预览</h3><img id="modalImg" src=""><input type="file" id="replaceInput" accept="image/*" style="display:none" onchange="handleReplaceFile(event)"><div class="modal-btns"><button style="background:var(--btn-swap-pink); color:white;" onclick="document.getElementById('replaceInput').click()">替换图片</button><button onclick="closeModal('viewModal')">关闭</button></div></div></div>
<div class="modal-overlay" id="swapModal"><div class="modal-box"><h3>🌸 调换排序</h3><p id="swapText"></p><div class="modal-btns"><button style="background:var(--btn-swap-pink); color:white;" onclick="confirmSwap()">确定调换</button><button onclick="closeModal('swapModal'); exitSwapMode();">取消</button></div></div></div>

<script>
    let db, currentFiles = [], isSwapMode = false, swapSelection = [], currentViewIndex = -1;

    const request = indexedDB.open("KakiDB", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("store"); };
    request.onsuccess = e => { db = e.target.result; loadFromDB(); updatePreview(); };

    function saveToDB() { const tx = db.transaction("store", "readwrite"); tx.objectStore("store").put(currentFiles, "imageList"); tx.oncomplete = renderPool; }
    function loadFromDB() { const tx = db.transaction("store", "readonly"); tx.objectStore("store").get("imageList").onsuccess = e => { if(e.target.result) currentFiles = e.target.result; renderPool(); }; }

    function renderPool() {
        const pool = document.getElementById('pool');
        pool.innerHTML = "";
        currentFiles.forEach((file, index) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'thumb-wrapper';
            wrapper.onclick = () => handleThumbClick(index, wrapper);
            const img = document.createElement('img'); img.src = URL.createObjectURL(file);
            const badge = document.createElement('div'); badge.className = 'thumb-badge'; badge.innerText = index + 1;
            wrapper.appendChild(img); wrapper.appendChild(badge); pool.appendChild(wrapper);
        });
    }

    document.getElementById('fileInput').onchange = (e) => { currentFiles = currentFiles.concat(Array.from(e.target.files)); saveToDB(); e.target.value = ""; };
    function clearStorage() { currentFiles = []; saveToDB(); document.getElementById('resultContainer').innerHTML = ""; }

    function toggleRatioInput() {
        const val = document.getElementById('ratioSelect').value;
        document.getElementById('customRatioUI').style.display = (val === 'custom') ? 'grid' : 'none';
    }

    function toggleNumSection() { document.getElementById('numSettings').style.display = document.getElementById('numEnable').checked ? 'block' : 'none'; }
    function toggleStroke() { document.getElementById('strokeSettings').style.display = document.getElementById('sEnable').checked ? 'flex' : 'none'; }
    function toggleShadow() { document.getElementById('shadowSettings').style.display = document.getElementById('shEnable').checked ? 'flex' : 'none'; }

    function updatePreview() {
        const text = document.getElementById('previewText');
        
        // 字体预览
        const color = document.getElementById('fColor').value;
        const alpha = document.getElementById('fAlpha').value;
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        text.style.color = `rgba(${r},${g},${b},${alpha})`;
        text.innerText = document.getElementById('startNum').value;
        text.style.fontSize = document.getElementById('fSize').value + 'px';
        text.style.fontFamily = document.getElementById('fontFamily').value;
        
        // 描边预览 (利用 webkitTextStroke)
        if(document.getElementById('sEnable').checked) {
            const sColor = document.getElementById('sColor').value;
            const sAlpha = document.getElementById('sAlpha').value;
            const sW = document.getElementById('sWidth').value;
            const sr = parseInt(sColor.slice(1,3), 16), sg = parseInt(sColor.slice(3,5), 16), sb = parseInt(sColor.slice(5,7), 16);
            text.style.webkitTextStroke = `${sW}px rgba(${sr},${sg},${sb},${sAlpha})`;
        } else {
            text.style.webkitTextStroke = '0';
        }

        // 阴影预览
        if(document.getElementById('shEnable').checked) {
            const shColor = document.getElementById('shColor').value;
            const shAlpha = document.getElementById('shAlpha').value;
            const shr = parseInt(shColor.slice(1,3), 16), shg = parseInt(shColor.slice(3,5), 16), shb = parseInt(shColor.slice(5,7), 16);
            text.style.textShadow = `2px 4px 6px rgba(${shr},${shg},${shb},${shAlpha})`;
        } else {
            text.style.textShadow = 'none';
        }
    }

    async function generate() {
        if (currentFiles.length === 0) return;
        const container = document.getElementById('resultContainer');
        container.innerHTML = "";
        
        const rows = parseInt(document.getElementById('rows').value);
        const cols = parseInt(document.getElementById('cols').value);
        const q = parseInt(document.getElementById('quality').value) / 100;
        const ratioType = document.getElementById('ratioSelect').value;
        let rW, rH;
        if(ratioType === 'custom') { rW = document.getElementById('ratioW').value; rH = document.getElementById('ratioH').value; }
        else { [rW, rH] = ratioType.split(':'); }

        const itemW = 400, itemH = itemW * (rH / rW), perPage = rows * cols;

        for (let i = 0; i < currentFiles.length; i += perPage) {
            const remaining = currentFiles.length - i;
            const currentRows = Math.ceil(Math.min(remaining, perPage) / cols);
            const currentCols = Math.min(remaining, cols);

            const canvas = document.createElement('canvas');
            canvas.width = currentCols * itemW;
            canvas.height = currentRows * itemH;
            
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,canvas.width,canvas.height);

            for (let j = 0; j < perPage && (i+j) < currentFiles.length; j++) {
                const img = await loadImage(URL.createObjectURL(currentFiles[i+j]));
                const x = (j % cols) * itemW;
                const y = Math.floor(j / cols) * itemH;
                drawCover(ctx, img, x, y, itemW, itemH);
                if(document.getElementById('numEnable').checked) drawText(ctx, parseInt(document.getElementById('startNum').value) + i + j, x, y, itemW, itemH);
            }
            const resImg = document.createElement('img'); resImg.src = canvas.toDataURL("image/jpeg", q); container.appendChild(resImg);
        }
    }

    function drawCover(ctx, img, x, y, w, h) {
        const iR = img.width/img.height, tR = w/h;
        let sx, sy, sw, sh;
        if(iR > tR) { sh = img.height; sw = sh*tR; sx = (img.width-sw)/2; sy = 0; }
        else { sw = img.width; sh = sw/tR; sx = 0; sy = (img.height-sh)/2; }
        ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function drawText(ctx, text, x, y, w, h) {
        const size = parseInt(document.getElementById('fSize').value);
        const font = document.getElementById('fontFamily').value;
        const color = document.getElementById('fColor').value;
        const alpha = document.getElementById('fAlpha').value;
        const r = parseInt(color.slice(1,3), 16), g = parseInt(color.slice(3,5), 16), b = parseInt(color.slice(5,7), 16);
        
        ctx.font = `bold ${size}px ${font}`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        
        let tx, ty, p = size * 0.8;
        const pos = document.getElementById('pos').value;
        if (pos === 'lt') { tx = x + p; ty = y + p; }
        else if (pos === 'rt') { tx = x + w - p; ty = y + p; }
        else if (pos === 'lb') { tx = x + p; ty = y + h - p; }
        else if (pos === 'rb') { tx = x + w - p; ty = y + h - p; }
        else { tx = x + w/2; ty = y + h/2; }

        // 阴影
        if(document.getElementById('shEnable').checked) { 
            const shColor = document.getElementById('shColor').value;
            const shAlpha = document.getElementById('shAlpha').value;
            const shr = parseInt(shColor.slice(1,3), 16), shg = parseInt(shColor.slice(3,5), 16), shb = parseInt(shColor.slice(5,7), 16);
            ctx.shadowColor = `rgba(${shr},${shg},${shb},${shAlpha})`; 
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 4;
        } else {
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
        }

        // 描边
        if(document.getElementById('sEnable').checked) {
            const sColor = document.getElementById('sColor').value;
            const sAlpha = document.getElementById('sAlpha').value;
            const sr = parseInt(sColor.slice(1,3), 16), sg = parseInt(sColor.slice(3,5), 16), sb = parseInt(sColor.slice(5,7), 16);
            ctx.strokeStyle = `rgba(${sr},${sg},${sb},${sAlpha})`;
            ctx.lineWidth = document.getElementById('sWidth').value;
            ctx.strokeText(text, tx, ty);
        }
        
        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.fillText(text, tx, ty);
        
        ctx.shadowBlur = 0; // 重置
    }

    function loadImage(url) { return new Promise(r => { const i = new Image(); i.onload = () => r(i); i.src = url; }); }
    function handleThumbClick(i, el) { if(isSwapMode){ if(swapSelection.includes(i))return; swapSelection.push(i); el.classList.add('swap-active'); if(swapSelection.length===2){ document.getElementById('swapText').innerText=`是否调换第 ${swapSelection[0]+1} 张与第 ${swapSelection[1]+1} 张？`; document.getElementById('swapModal').style.display='flex'; } }else{ currentViewIndex=i; document.getElementById('modalImg').src=URL.createObjectURL(currentFiles[i]); document.getElementById('viewModal').style.display='flex'; }}
    function toggleSwapMode() { isSwapMode = !isSwapMode; swapSelection = []; renderPool(); const b = document.getElementById('swapBtn'); b.innerText = isSwapMode ? "请点击两张图" : "调换图片"; b.classList.toggle('active', isSwapMode); }
    function confirmSwap() { const [i, j] = swapSelection; [currentFiles[i], currentFiles[j]] = [currentFiles[j], currentFiles[i]]; closeModal('swapModal'); exitSwapMode(); saveToDB(); }
    function exitSwapMode() { isSwapMode = false; document.getElementById('swapBtn').innerText = "调换图片"; document.getElementById('swapBtn').classList.remove('active'); swapSelection = []; renderPool(); }
    function handleReplaceFile(e) { if(e.target.files[0]) { currentFiles[currentViewIndex] = e.target.files[0]; saveToDB(); closeModal('viewModal'); } }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
